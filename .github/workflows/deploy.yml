name: Deploy to EC2

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 760050152559.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: wishwe/ecr

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Django image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/django:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/django:latest \
            -f infra/docker/django/Dockerfile \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY/django:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY/django:latest

      - name: Build & push Next.js image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/nextjs:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/nextjs:latest \
            -f infra/docker/frontend/Dockerfile \
            ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY/nextjs:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY/nextjs:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,AWS_REGION
          script: |
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            cd /var/www/app/infra/docker
            docker compose pull
            docker compose up -d --remove-orphans

            sleep 30
            docker compose restart nginx

            docker image prune -f

      - name: Notify Discord (success)
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "Deployment succeeded"
          description: "✅ `${{ github.repository }}` was deployed to EC2 by **${{ github.actor }}**"
          color: 0x2ecc71

      - name: Notify Discord (failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "Deployment failed"
          description: "❌ `${{ github.repository }}` deployment failed — triggered by **${{ github.actor }}**"
          color: 0xe74c3c