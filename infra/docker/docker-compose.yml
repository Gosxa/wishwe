services:

  django:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/django/Dockerfile
    restart: unless-stopped
    env_file:
      - /var/www/app/backend/.env
    volumes:
      - static_files:/app/staticfiles
    expose:
      - "8000"
    networks:
      - backend
    command: bash -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && gunicorn wishwe_api.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --worker-tmp-dir /tmp --access-logfile - --error-logfile -"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 8000))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nextjs:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/frontend/Dockerfile
      args:
       - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - backend
    env_file:
      - /var/www/app/backend/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || wget -qO- http://localhost:3000 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/app/staticfiles:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      django:
        condition: service_healthy
      nextjs:
        condition: service_started
    networks:
      - backend

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

  netdata:
    image: netdata/netdata
    container_name: netdata
    pid: host
    network_mode: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - NETDATA_CLAIM_TOKEN=v91OQXdvdasmc1pLOVr7T7zgqeNN-78oNwLCspFc9Av_3V0niUEKj03Loz7e1w5css01LiNJ2i0wLkU_jXXsRENP-7yborJ9TXGAxcROZTxuAGttstHMC_SRXh0ZAYFUaOdK4hc
      - NETDATA_CLAIM_URL=https://app.netdata.cloud
      - NETDATA_CLAIM_ROOMS=44e7a3bd-0768-495b-a7e4-97ec1f95a39b
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/dbus:/run/dbus:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend

  celery_worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/django/Dockerfile
    command: celery -A wishwe_api worker -l info
    restart: unless-stopped
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - /var/www/app/backend/.env
    networks:
      - backend

  celery_beat:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/django/Dockerfile
    command: celery -A wishwe_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - /var/www/app/backend/.env
    networks:
      - backend

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
  static_files:

networks:
  backend:
    driver: bridge
